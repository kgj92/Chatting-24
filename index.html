<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:type" content="website"> 
<meta property="og:title" content="채팅24">
<meta property="og:description" content="100% 익명(로그인X) 하고싶은 말 싸지르는 웹 채팅">
<meta property="og:url" content="http://chatting-24.netlify.app">
<meta name="description" content="100% 익명(로그인X) 하고싶은 말 싸지르는 웹 채팅">
<title>채팅24</title>

<style>
*{
    box-sizing:border-box;
}

html,body{
    margin:0;
    padding:0;
    height:100%;
    font-family:sans-serif;
    display:flex;
    flex-direction:column;
    background:#fff;
}

header{
    text-align:center;
    padding:1rem;
    background:#f0f0f0;
    font-size:1.5rem;
    font-weight:bold;
}

#chat{
    flex:1;
    overflow-y:auto;
    padding:1rem;
}

.message{
    margin-bottom:1rem;
}

.message img{
    max-width:200px;
    display:block;
    margin-top:5px;
}

.timestamp{
    font-size:12px;
    color:#777;
    margin-top:3px;
}

#inputBox{
    display:flex;
    align-items:center;
    gap:8px;
    padding:10px;
    border-top:1px solid #ccc;
    background:#fafafa;
}

#message{
    flex:1;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    border:none;
    background:#f0f0f0;
    border-radius:8px;
    cursor:pointer;
}

#sendBtn{
    padding:10px 15px;
    color:blue;
}

#emojiBtn{
    width:45px;
    height:45px;
    font-size:22px;
}

#stickerBox{
    display:none;
    position:fixed;
    bottom:75px;
    left:10px;

    width:280px;

    background:white;
    border:1px solid #ccc;
    border-radius:12px;

    padding:10px;

    flex-wrap:wrap;
    gap:8px;

    box-shadow:0 2px 10px rgba(0,0,0,.15);
    z-index:999;
}

#stickerBox img{
    width:60px;
    height:60px;
    cursor:pointer;
    border-radius:8px;
}

#stickerBox img:hover{
    background:#f0f0f0;
}
</style>
</head>

<body>

<header>💬</header>

<div id="chat"></div>

<div id="stickerBox">
    <img src="stickers/1.png" onclick="sendSticker('stickers/1.png')">
    <img src="stickers/2.png" onclick="sendSticker('stickers/2.png')">
    <img src="stickers/3.png" onclick="sendSticker('stickers/3.png')">
    <img src="stickers/4.png" onclick="sendSticker('stickers/4.png')">
    <img src="stickers/5.png" onclick="sendSticker('stickers/5.png')">
    <img src="stickers/6.png" onclick="sendSticker('stickers/6.png')">
</div>

<div id="inputBox">

    <button id="emojiBtn">😊</button>

    <input
        id="message"
        placeholder="메시지를 입력하세요..."
    >

    <input
        type="file"
        id="imageInput"
        accept="image/*"
    >

    <button id="sendBtn" onclick="sendMessage()">
        보내기
    </button>

</div>

<script src="https://one23-9wul.onrender.com/socket.io/socket.io.js"></script>

<script>

const socket = io("https://one23-9wul.onrender.com");

const chat = document.getElementById("chat");
const messageInput = document.getElementById("message");
const imageInput = document.getElementById("imageInput");

const emojiBtn = document.getElementById("emojiBtn");
const stickerBox = document.getElementById("stickerBox");

function getTime(){
    const now = new Date();

    return now.toLocaleTimeString([],{
        hour:"2-digit",
        minute:"2-digit"
    });
}

emojiBtn.onclick = () => {

    if(stickerBox.style.display === "flex"){
        stickerBox.style.display = "none";
    }else{
        stickerBox.style.display = "flex";
    }

};

function sendSticker(src){

    socket.emit("chat message",{
        type:"image",
        content:src,
        time:getTime()
    });

    stickerBox.style.display = "none";
}

function sendMessage(){

    const msg = messageInput.value.trim();
    const file = imageInput.files[0];
    const timestamp = getTime();

    if(msg){

        socket.emit("chat message",{
            type:"text",
            content:msg,
            time:timestamp
        });

        messageInput.value = "";
    }

    if(file){

        const reader = new FileReader();

        reader.onload = function(e){

            socket.emit("chat message",{
                type:"image",
                content:e.target.result,
                time:timestamp
            });

        };

        reader.readAsDataURL(file);

        imageInput.value = "";
    }

}

socket.on("chat message",(data)=>{

    const wrapper = document.createElement("div");
    wrapper.classList.add("message");

    if(data.type === "text"){

        const text = document.createElement("div");
        text.textContent = data.content;
        wrapper.appendChild(text);

    }

    if(data.type === "image"){

        const img = document.createElement("img");
        img.src = data.content;
        wrapper.appendChild(img);

    }

    const time = document.createElement("div");
    time.classList.add("timestamp");
    time.textContent = data.time || "";

    wrapper.appendChild(time);

    chat.appendChild(wrapper);

    chat.scrollTop = chat.scrollHeight;

});

messageInput.addEventListener("keypress",(e)=>{

    if(e.key === "Enter"){

        e.preventDefault();
        sendMessage();

    }

});

</script>

</body>
</html>
