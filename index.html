<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="naver-site-verification" content="f6ee7e857b99609432e06d64db842eb2df949d9d" />
  <meta property="og:type" content="website"> 
  <meta property="og:title" content="채팅24">
  <meta property="og:description" content="100% 익명(로그인X) 하고싶은 말 싸지르는 웹 채팅 사이트">
  <meta property="og:url" content="http://www.chatting-24.netlify.app">
  <meta name="description" content="100% 익명(로그인X) 하고싶은 말 싸지르는 웹 채팅 사이트">
  <title>chatting24</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      font-size: 18px;
    }

    header {
      text-align: center;
      padding: 1rem;
      background-color: #f0f0f0;
      font-size: 1.6rem;
      font-weight: bold;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      background: #ffffff;
    }

    .message {
      margin-bottom: 1rem;
    }

    .message-text {
      color: #000;
      font-size: 1rem;
    }

    .timestamp {
      font-size: 0.75rem;
      color: #777;
      margin-top: 0.2rem;
    }

    .message img {
      max-width: 200px;
      display: block;
      margin-top: 0.3rem;
    }

    #inputBox {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.75rem;
      border-top: 1px solid #ccc;
      background: #fafafa;
    }

    #message {
      flex: 1;
      padding: 0.8rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    #imageInput {
      font-size: 1rem;
    }

    button {
      padding: 0.8rem 1rem;
      font-size: 1rem;
      background-color: #f0f0f0;
      color: blue;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:active {
      opacity: 0.9;
    }
    #stickerBox {
  display: none;
  position: fixed;
  bottom: 80px;
  left: 10px;
  background: white;
  border: 1px solid #ccc;
  border-radius: 10px;
  padding: 10px;
  gap: 8px;
  flex-wrap: wrap;
  width: 220px;
  z-index: 1000;
}

#stickerBox img {
  width: 60px;
  height: 60px;
  cursor: pointer;
  border-radius: 8px;
}

#stickerBox img:hover {
  background: #f0f0f0;
}

#emojiBtn {
  font-size: 24px;
  padding: 8px;
}
  </style>
</head>
<body>
  <header>💬</header>
  <div id="chat"></div>

  <div id="inputBox">
    <input id="message" placeholder="메시지를 입력하세요..." />
    <input type="file" id="imageInput" accept="image/*" />
    <button onclick="sendMessage()">보내기</button>
    <button id="emojiBtn">😊</button>

<div id="stickerBox">
  <img src="stickers/1.png" onclick="sendSticker('stickers/1.png')">
  <img src="stickers/2.png" onclick="sendSticker('stickers/2.png')">
  <img src="stickers/3.png" onclick="sendSticker('stickers/3.png')">
  <img src="stickers/4.png" onclick="sendSticker('stickers/4.png')">
</div>

<input id="message" placeholder="메시지를 입력하세요..." />
  </div>

  <!-- socket.io 연결 -->
  <script src="https://one23-9wul.onrender.com/socket.io/socket.io.js"></script>
  <script>
    const socket = io("https://one23-9wul.onrender.com");
    const chat = document.getElementById("chat");
    const messageInput = document.getElementById("message");
    const imageInput = document.getElementById("imageInput");

    function getTime() {
      const now = new Date();
      return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function sendMessage() {
      const msg = messageInput.value.trim();
      const file = imageInput.files[0];
      const timestamp = getTime();

      if (msg) {
        socket.emit("chat message", {
          type: "text",
          content: msg,
          time: timestamp
        });
        messageInput.value = "";
      }

      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          socket.emit("chat message", {
            type: "image",
            content: e.target.result,
            time: timestamp
          });
        };
        reader.readAsDataURL(file);
        imageInput.value = "";
      }
    }

    socket.on("chat message", (data) => {
      const wrapper = document.createElement("div");
      wrapper.classList.add("message");

      if (data.type === "text") {
        const text = document.createElement("div");
        text.classList.add("message-text");
        text.textContent = data.content;
        wrapper.appendChild(text);
      } else if (data.type === "image") {
        const img = document.createElement("img");
        img.src = data.content;
        wrapper.appendChild(img);
      }

      const time = document.createElement("div");
      time.classList.add("timestamp");
      time.textContent = data.time || '';
      wrapper.appendChild(time);

      chat.appendChild(wrapper);
      chat.scrollTop = chat.scrollHeight;
    });

    messageInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
      }
    });
    const emojiBtn = document.getElementById("emojiBtn");
const stickerBox = document.getElementById("stickerBox");

emojiBtn.addEventListener("click", () => {
  stickerBox.style.display =
    stickerBox.style.display === "flex"
      ? "none"
      : "flex";
});
    function sendSticker(src) {
  socket.emit("chat message", {
    type: "image",
    content: src,
    time: getTime()
  });

  stickerBox.style.display = "none";
}
  </script>
</body>
</html>
